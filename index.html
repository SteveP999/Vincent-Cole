<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vincent Cole</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Jost:wght@300;500&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#08070A;color:#EDE5D0;font-family:'Jost',sans-serif;padding-bottom:80px}
.hero{padding:80px 30px;text-align:center;background:#111}
.hero h1{font-family:'Playfair Display',serif;font-size:48px;margin:0}
.section{padding:40px 30px;max-width:1000px;margin:auto}
.latest-grid,.track-row{display:flex;align-items:center;gap:20px}
.track-row{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.track-row img{width:60px;height:60px;object-fit:cover}
button{padding:10px 18px;cursor:pointer}
#latest-cover{width:300px;height:300px;object-fit:cover}
</style>
</head>
<body>

<section class="hero">
<h1>Vincent Cole</h1>
<p>Big Band • American Standards • Swing</p>
<button id="heroPlay">Play Latest Single</button>
</section>

<section class="section">
<h2>Latest Single</h2>
<div class="latest-grid">
<img id="latest-cover" src="" alt="cover">
<div>
<h3 id="latest-title">Loading...</h3>
<p id="latest-album">The Cole Standard</p>
<button id="latestPlay">Play</button>
</div>
</div>
</section>

<section class="section">
<h2>The Cole Standard</h2>
<div id="track-list"></div>
</section>

<audio id="audioPlayer"></audio>

<script>
let tracks=[];
let currentIndex=0;
const audio=document.getElementById('audioPlayer');

function playTrack(index){
  currentIndex=index;
  const song=tracks[index];
  audio.src=song.audio;
  audio.play();
}

function renderLatest(){
  const latest=tracks.find(t=>t.isLatest) || tracks[tracks.length-1];
  document.getElementById('latest-title').textContent=latest.title;
  document.getElementById('latest-cover').src=latest.cover;

  document.getElementById('latestPlay').onclick=()=>{
    playTrack(tracks.indexOf(latest));
  }

  document.getElementById('heroPlay').onclick=()=>{
    playTrack(tracks.indexOf(latest));
  }
}

function renderTracks(){
  const container=document.getElementById('track-list');

  container.innerHTML=tracks.map((track,index)=>`
    <div class="track-row">
      <img src="${track.cover}" alt="${track.title}">
      <div style="flex:1;">
        <strong>${track.num}</strong> - ${track.title}
      </div>
      <button onclick="playTrack(${index})">Play</button>
    </div>
  `).join('');
}

async function loadSongs(){
  const response=await fetch('./songs.json?v='+Date.now());
  tracks=await response.json();

  renderLatest();
  renderTracks();
}

loadSongs();
</script>

</body>
</html>
